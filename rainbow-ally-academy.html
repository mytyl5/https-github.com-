<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rainbow Ally Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'M PLUS Rounded 1c',sans-serif;background:#fdfbfb;color:#1A1A1A;min-height:100vh;overflow-x:hidden;}

/* Rainbow gradient utility */
.rainbow-text{background:linear-gradient(90deg,#FF0000,#FF8E00,#FFEF00,#008121,#004CFF,#760089);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.rainbow-bg{background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 20%,#a1c4fd 40%,#c2e9fb 60%,#d4fc79 80%,#fbc2eb 100%);}
.rainbow-border{border:4px solid transparent;background:linear-gradient(white,white) padding-box, linear-gradient(90deg,#FF0000,#FF8E00,#FFEF00,#008121,#004CFF,#760089) border-box;}

/* Header */
header{position:fixed;top:0;left:0;right:0;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);box-shadow:0 2px 12px rgba(0,0,0,.06);z-index:100;padding:.8rem 1.2rem;display:flex;align-items:center;justify-content:space-between;}
.header-logo{display:flex;align-items:center;gap:.5rem;cursor:pointer;}
.header-logo h1{font-size:1.2rem;font-weight:900;}
.header-back{font-size:.85rem;font-weight:700;color:#888;background:none;border:none;cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif;}
.header-back:hover{color:#333;}

main{max-width:700px;margin:0 auto;padding:5.5rem 1.2rem 2rem;}

/* ===== WELCOME ===== */
#screen-welcome{text-align:center;animation:fadeIn .5s ease;}
.welcome-hero{font-size:6rem;display:inline-block;animation:bounce 2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);};}
.welcome-badge{display:inline-block;background:#facc15;color:#fff;font-size:.75rem;font-weight:900;padding:.25rem .8rem;border-radius:999px;transform:rotate(12deg);box-shadow:0 2px 8px rgba(250,204,21,.4);margin-top:-1rem;position:relative;top:-.5rem;right:-2rem;}
.welcome-title{font-size:clamp(2rem,8vw,3.2rem);font-weight:900;color:#1f2937;line-height:1.1;margin:1.5rem 0 .8rem;}
.welcome-desc{color:#6b7280;font-weight:700;max-width:360px;margin:0 auto 2.5rem;line-height:1.7;}
.level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;}
.level-card{border:none;cursor:pointer;padding:1.5rem 1rem;border-radius:1.8rem;font-family:'M PLUS Rounded 1c',sans-serif;font-weight:900;color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.15);transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;}
.level-card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.2);}
.level-card:active{transform:scale(.97);}
.level-card::after{content:'';position:absolute;inset:0;background:#fff;opacity:0;transition:opacity .2s;border-radius:1.8rem;}
.level-card:hover::after{opacity:.08;}
.level-beginner{background:linear-gradient(135deg,#34d399,#10b981);}
.level-intermediate{background:linear-gradient(135deg,#60a5fa,#4f46e5);}
.level-advanced{background:linear-gradient(135deg,#c084fc,#ec4899);}
.level-label{font-size:1.3rem;display:block;margin-bottom:.2rem;}
.level-desc-text{font-size:.75rem;opacity:.85;font-weight:700;}

/* ===== QUIZ ===== */
#screen-quiz{display:none;animation:fadeIn .4s ease;}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;}
.quiz-meta-label{font-size:.85rem;font-weight:900;color:#9ca3af;}
.progress-mini{height:.5rem;width:8rem;background:#e5e7eb;border-radius:999px;overflow:hidden;}
.progress-mini-fill{height:100%;background:linear-gradient(90deg,#f87171,#a855f7);border-radius:999px;transition:width .4s;}
.question-text{font-size:clamp(1rem,3.5vw,1.25rem);font-weight:900;color:#1f2937;line-height:1.6;margin-bottom:1.8rem;min-height:4rem;}
.options-list{display:flex;flex-direction:column;gap:.8rem;}
.option-btn{border:2px solid #f0f0f0;background:#fff;border-radius:1.4rem;padding:1rem 1.2rem;font-family:'M PLUS Rounded 1c',sans-serif;font-weight:900;font-size:.95rem;cursor:pointer;text-align:left;display:flex;align-items:center;gap:.8rem;transition:all .2s;width:100%;color:#374151;}
.option-btn:not(:disabled):hover{border-color:#d1d5db;background:#f9fafb;}
.option-btn:active:not(:disabled){transform:scale(.98);}
.opt-letter{width:2rem;height:2rem;min-width:2rem;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:900;}
.option-btn.correct{border-color:#22c55e;background:#f0fdf4;color:#166534;}
.option-btn.correct .opt-letter{background:#22c55e;color:#fff;}
.option-btn.wrong{border-color:#ef4444;background:#fef2f2;color:#991b1b;}
.option-btn.wrong .opt-letter{background:#ef4444;color:#fff;}
.option-btn.dim{border-color:#f9fafb;opacity:.45;}
.option-btn:disabled{cursor:default;}

.explanation-box{margin-top:1.5rem;padding:1.4rem 1.5rem;background:#fff;border-radius:1.8rem;border:2px dashed #d1d5db;box-shadow:0 4px 20px rgba(0,0,0,.06);animation:fadeIn .3s ease;}
.exp-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem;}
.exp-label{font-weight:900;}
.exp-label.correct-label{color:#16a34a;}
.exp-label.wrong-label{color:#2563eb;}
.exp-text{font-weight:700;color:#374151;font-size:.9rem;line-height:1.65;margin-bottom:1rem;}
.next-btn{width:100%;background:#111;color:#fff;border:none;border-radius:1.2rem;padding:1rem;font-family:'M PLUS Rounded 1c',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;transition:all .15s;}
.next-btn:hover{background:#000;}
.next-btn:active{transform:scale(.98);}

/* ===== RESULT ===== */
#screen-result{display:none;animation:scaleIn .5s ease;}
@keyframes scaleIn{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:none;};}
.result-card{background:#fff;border-radius:2.5rem;box-shadow:0 12px 50px rgba(0,0,0,.1);overflow:hidden;border:6px solid #fff;}
.result-header{padding:2.5rem 2rem;text-align:center;position:relative;overflow:hidden;}
.result-confetti{position:absolute;inset:0;pointer-events:none;opacity:.2;}
.result-level-tag{display:inline-block;padding:.25rem 1rem;background:rgba(255,255,255,.6);border-radius:999px;font-size:.75rem;font-weight:900;color:#555;margin-bottom:.8rem;backdrop-filter:blur(4px);}
.result-title{font-size:1.6rem;font-weight:900;color:#1f2937;margin-bottom:1.5rem;}

/* Donut chart */
.donut-wrap{position:relative;width:9rem;height:9rem;margin:0 auto 1.5rem;}
.donut-svg{transform:rotate(-90deg);}
.donut-bg{fill:none;stroke:#f3f4f6;stroke-width:16;}
.donut-fill{fill:none;stroke:#10b981;stroke-width:16;stroke-linecap:round;transition:stroke-dasharray 1s ease;}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut-score{font-size:2.2rem;font-weight:900;color:#1f2937;line-height:1;}
.donut-total{font-size:.75rem;font-weight:700;color:#9ca3af;}

.profile-card{background:#fff;border-radius:1.8rem;padding:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:1rem;}
.profile-icon{font-size:3.5rem;margin-bottom:.6rem;display:block;transition:transform .2s;}
.profile-icon:hover{transform:scale(1.1);}
.profile-name{font-size:1.3rem;font-weight:900;margin-bottom:.4rem;}
.profile-desc{font-size:.85rem;color:#6b7280;font-weight:700;line-height:1.6;}

.message-wrap{background:rgba(255,255,255,.45);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.6);border-radius:1.4rem;padding:1.2rem;}
.message-label{font-size:.65rem;color:#6b7280;font-weight:900;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.3rem;}
.message-text{font-weight:700;color:#1f2937;font-style:italic;font-size:.95rem;line-height:1.6;}

.result-footer{padding:2rem;background:#f9fafb;text-align:center;}
.gift-section{margin-bottom:1.5rem;}
.gift-label{font-size:.8rem;font-weight:900;color:#6b7280;margin-bottom:.8rem;}
.gift-ticket{display:inline-flex;align-items:center;gap:1rem;background:#fff;padding:1rem 1.5rem;border-radius:1.2rem;border:2px dashed #d1d5db;transform:rotate(1deg);}
.gift-ticket-text{text-align:left;}
.gift-ticket-sub{font-size:.7rem;font-weight:900;color:#9ca3af;text-transform:uppercase;}
.gift-ticket-main{font-size:1.1rem;font-weight:900;}
.reset-btn{width:100%;max-width:20rem;margin:0 auto;display:block;background:#111;color:#fff;border:none;border-radius:1.4rem;padding:1.1rem;font-family:'M PLUS Rounded 1c',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;transition:all .15s;box-shadow:0 6px 20px rgba(0,0,0,.2);}
.reset-btn:hover{background:#000;}
.reset-btn:active{transform:scale(.97);}
.stock-note{margin-top:.8rem;font-size:.65rem;color:#9ca3af;}

/* bg blobs */
.blob1{position:fixed;bottom:-6rem;left:-6rem;width:16rem;height:16rem;background:#fecaca;border-radius:50%;filter:blur(3rem);opacity:.4;pointer-events:none;}
.blob2{position:fixed;top:-6rem;right:-6rem;width:16rem;height:16rem;background:#bfdbfe;border-radius:50%;filter:blur(3rem);opacity:.4;pointer-events:none;}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;};}
</style>
</head>
<body>

<div class="blob1"></div>
<div class="blob2"></div>

<header>
  <div class="header-logo" onclick="resetGame()">
    <span style="font-size:1.5rem;">🌈</span>
    <h1 class="rainbow-text">Ally Academy</h1>
  </div>
  <button class="header-back" onclick="resetGame()">トップへ戻る</button>
</header>

<main>

<!-- WELCOME -->
<div id="screen-welcome">
  <div style="position:relative;display:inline-block;">
    <div class="welcome-hero">🦄</div>
    <div class="welcome-badge">Let's Learn!</div>
  </div>
  <h2 class="welcome-title">Rainbow<br><span class="rainbow-text">Ally Academy</span></h2>
  <p class="welcome-desc">LGBTQ+のことを楽しく学んで、世界をよりカラフルにする「アライ（味方）」への一歩を踏み出そう！</p>
  <div class="level-grid">
    <button class="level-card level-beginner" onclick="startQuiz('BEGINNER')">
      <span class="level-label">初級</span>
      <span class="level-desc-text">まずはここから！</span>
    </button>
    <button class="level-card level-intermediate" onclick="startQuiz('INTERMEDIATE')">
      <span class="level-label">中級</span>
      <span class="level-desc-text">もっと詳しく！</span>
    </button>
    <button class="level-card level-advanced" onclick="startQuiz('ADVANCED')">
      <span class="level-label">上級</span>
      <span class="level-desc-text">アライのプロへ</span>
    </button>
  </div>
</div>

<!-- QUIZ -->
<div id="screen-quiz">
  <div class="quiz-meta">
    <span class="quiz-meta-label">QUESTION <span id="q-num">1</span> / <span id="q-total">10</span></span>
    <div class="progress-mini"><div class="progress-mini-fill" id="q-progress" style="width:10%;"></div></div>
  </div>
  <p class="question-text" id="q-text"></p>
  <div class="options-list" id="q-options"></div>
  <div id="q-explanation" class="explanation-box" style="display:none;">
    <div class="exp-header">
      <span id="exp-icon" style="font-size:1.4rem;"></span>
      <span id="exp-label" class="exp-label"></span>
    </div>
    <p class="exp-text" id="exp-text"></p>
    <button class="next-btn" onclick="handleNext()">次へ進む</button>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result">
  <div class="result-card">
    <div class="result-header rainbow-bg">
      <div class="result-confetti" id="confetti-area"></div>
      <div class="result-level-tag">LEVEL: <span id="r-level"></span></div>
      <h2 class="result-title">あなたの診断結果</h2>
      <div class="donut-wrap">
        <svg class="donut-svg" width="144" height="144" viewBox="0 0 144 144">
          <circle class="donut-bg" cx="72" cy="72" r="56"/>
          <circle class="donut-fill" id="donut-fill" cx="72" cy="72" r="56" stroke-dasharray="0 352" stroke-dashoffset="0"/>
        </svg>
        <div class="donut-center">
          <span class="donut-score" id="r-score"></span>
          <span class="donut-total">/ <span id="r-total"></span></span>
        </div>
      </div>
      <div class="profile-card">
        <span class="profile-icon" id="r-icon"></span>
        <p class="profile-name" id="r-name" style=""></p>
        <p class="profile-desc" id="r-desc"></p>
      </div>
      <div class="message-wrap">
        <p class="message-label">Character Message</p>
        <p class="message-text" id="r-message"></p>
      </div>
    </div>
    <div class="result-footer">
      <div class="gift-section">
        <p class="gift-label">🎁 ブースのスタッフに見せてね！</p>
        <div class="gift-ticket">
          <div class="gift-ticket-text">
            <p class="gift-ticket-sub">SPECIAL REWARD</p>
            <p class="gift-ticket-main rainbow-text">アライグッズ引換証</p>
          </div>
          <span style="font-size:2.5rem;">🎟️</span>
        </div>
      </div>
      <button class="reset-btn" onclick="resetGame()">もう一度挑戦する</button>
      <p class="stock-note">※グッズの在庫には限りがあります。</p>
    </div>
  </div>
</div>

</main>

<script>
const QUIZ_DATA = {
  BEGINNER: [
    {text:"LGBTQのシンボルとしてよく使われる「6色の旗」は何と呼ばれていますか？",options:["カラフルフラッグ","レインボーフラッグ","ピースフラッグ","ミラクルフラッグ"],correct:1,explanation:"正解はレインボーフラッグ！1978年にギルバート・ベイカーによってデザインされ、多様性の象徴となりました。"},
    {text:"LGBTQの「L」は何を指していますか？",options:["レズビアン","ライオン","ラベンダー","リーダーシップ"],correct:0,explanation:"Lはレズビアン（女性の同性愛者）の頭文字です。"},
    {text:"自分自身の性別をどのように認識しているかを何と言いますか？",options:["性自認","性的指向","性別発表","心の住所"],correct:0,explanation:"自分が自分の性をどう思っているかを「性自認（ジェンダー・アイデンティティ）」と言います。"},
    {text:"誰を好きになるか（またはならないか）を何と言いますか？",options:["趣味嗜好","性的指向","未来予想","自己肯定"],correct:1,explanation:"どの性に惹かれるかを「性的指向（セクシュアル・オリエンテーション）」と言います。"},
    {text:"LGBTQを支援し、連帯する人を何と呼びますか？",options:["フレンド","サポーター","アライ（Ally）","パートナー"],correct:2,explanation:"アライは英語で「同盟、味方」という意味。LGBTQ当事者ではないけれど、力になりたい人を指します。"},
    {text:"レインボーフラッグの「赤」が表す意味は何でしょう？",options:["愛","情熱","生命","平和"],correct:2,explanation:"赤は「生命（Life）」、橙は「癒やし」、黄は「太陽」、緑は「自然」、青は「調和」、紫は「精神」を象徴しています。"},
    {text:"トランスジェンダーの人が、本来の性で過ごすことを支援する日はいつ？",options:["1月1日","3月31日","10月31日","12月25日"],correct:1,explanation:"3月31日は「国際トランスジェンダー可視化の日」です。"},
    {text:"「LGBTQ+」の「+」にはどんな意味が込められていますか？",options:["プラスアルファ","それ以外の多様な性","足し算","もっと上を目指す"],correct:1,explanation:"LGBTQ以外にもたくさんのセクシュアリティがあり、全てを包含するという意味が込められています。"},
    {text:"カミングアウト（公表）を受けた時、一番大切な態度は？",options:["驚いて逃げる","否定する","話を否定せず聴く","勝手に他人に話す"],correct:2,explanation:"信頼して話してくれたことを受け止め、まずは「話してくれてありがとう」と伝えるのが大切です。"},
    {text:"日本各地で開催されている、多様性を祝うイベントの名前は？",options:["レインボーフェス","プライドパレード","ハッピーパレード","カラーフル・デイ"],correct:1,explanation:"プライド（誇り）を持って歩く「プライドパレード」は世界中で行われています。"}
  ],
  INTERMEDIATE: [
    {text:"SOGI（ソジ）の「G」は何の略？",options:["Gender Identity","Generous","General","Genial"],correct:0,explanation:"GはGender Identity（性自認）です。SOGIは性的指向と性自認の総称です。"},
    {text:"カミングアウトの反対で、本人の許可なくセクシュアリティを曝露することを何と言う？",options:["インティング","アウティング","リーク","バイラル"],correct:1,explanation:"アウティングは重大なプライバシー侵害であり、絶対にしてはいけません。"},
    {text:"誰に対しても恋愛感情や性的欲求を抱かない人を何と言う？",options:["バイセクシュアル","アセクシュアル","パンセクシュアル","クィア"],correct:1,explanation:"Asexual（アセクシュアル）は、無性愛者とも呼ばれます。"},
    {text:"「クィア」という言葉の元々の意味は？",options:["素敵な","変な・風変わりな","勇気ある","虹色の"],correct:1,explanation:"元々は蔑称でしたが、現在はポジティブな意味で使われるようになっています。"},
    {text:"性的指向が、特定の性別に限らず「全ての人」に向く人を何と言う？",options:["バイセクシュアル","パンセクシュアル","ヘテロセクシュアル","ホモセクシュアル"],correct:1,explanation:"Pansexual（パンセクシュアル）は、全性愛とも呼ばれます。"},
    {text:"生まれた時の性別と、自分の性自認が一致している人を何と言う？",options:["トランスジェンダー","シスジェンダー","ノーマルジェンダー","リアルジェンダー"],correct:1,explanation:"Cisgender（シスジェンダー）は、トランスジェンダーの対義語です。"},
    {text:"職場のLGBTQへの取り組みを評価する指標の名前は？",options:["RAINBOW Index","PRIDE Index","D&I Score","Ally Rank"],correct:1,explanation:"Work with Prideが策定した「PRIDE指標」が有名です。"},
    {text:"同性婚を認めていない国に対して、人権の観点から勧告を行う国際機関は？",options:["WHO","国連（UN）","FIFA","IOC"],correct:1,explanation:"国連は性的指向や性自認に基づく差別をなくすよう求めています。"},
    {text:"アライとして最初にできるアクションは何？",options:["旗を掲げる","寄付する","正しく知る","デモに参加する"],correct:2,explanation:"まずは正しい知識を身につけることが、理解の第一歩です。"},
    {text:"日本の自治体で導入が広がっている、同性カップルを認める制度は？",options:["パートナーシップ制度","同性婚特区","家族認定証","フレンドシップ制度"],correct:0,explanation:"法的効力は限定的ですが、多くの自治体で導入されています。"}
  ],
  ADVANCED: [
    {text:"「ストーンウォールの反乱」が起きたのは西暦何年？",options:["1959年","1969年","1979年","1989年"],correct:1,explanation:"1969年、ニューヨークのバー「ストーンウォール・イン」での反乱が近代LGBTQ運動の起点と言われます。"},
    {text:"現在、同性婚が法律で認められている国は約いくつ？（2024年現在）",options:["約10ヶ国","約35ヶ国","約70ヶ国","約100ヶ国"],correct:1,explanation:"世界で約35以上の国と地域で同性婚が認められています。"},
    {text:"日本で初めてパートナーシップ制度を導入した自治体はどこ？（2つ）",options:["新宿区・港区","渋谷区・世田谷区","中野区・杉並区","横浜市・大阪市"],correct:1,explanation:"2015年に渋谷区と世田谷区が同時に開始しました。"},
    {text:"性同一性障害特例法で、戸籍変更の要件となっていた「生殖不能要件」に対する最高裁の判断は？（2023年）",options:["合憲","違憲","判断回避","一部合憲"],correct:1,explanation:"2023年、最高裁は手術を必要とする要件を「違憲」と判断しました。"},
    {text:"アライの行動として「無意識の偏見」に気づくことを何と言う？",options:["マイクロアグレッションの解消","アンコンシャス・バイアスの自覚","アサーティブ・コミュニケーション","エンパワーメント"],correct:1,explanation:"自分の中にある無意識の思い込みに気づくことは非常に重要です。"},
    {text:"「インターセクショナリティ」という概念が説明するのは？",options:["交差する虹","差別やアイデンティティの重なり","国際的な協力","多角的な経営"],correct:1,explanation:"人種、性、階級など、複数の属性が重なり合うことで生じる特有の抑圧を理解する概念です。"},

const ALLY_PROFILES = [
  {name:"レインボー・ビギナー",desc:"まずは知ることから。優しさと好奇心にあふれた、未来のアライ候補！",icon:"🌱",color:"#16a34a",message:"「知ろうとした一歩が、誰かの大きな力になる。これからもっと一緒に学ぼう！」"},
  {name:"ハートフル・サポーター",desc:"誰かの力になりたいという温かい心を持っています。身近なところから変化を作れる人です。",icon:"💖",color:"#dc2626",message:"「あなたの温かさが、世界をもっと生きやすくする。その心を大切にしてね。」"},
  {name:"インクルーシブ・リーダー",desc:"知識も行動力も抜群！周りを巻き込んで、みんなが過ごしやすい場所を作れるリーダータイプです。",icon:"👑",color:"#d97706",message:"「あなたの言葉と行動が、仲間の勇気に火をつける。リードしていこう！」"},
  {name:"情熱のレインボー・アライ",desc:"当事者の声に耳を傾け、社会を変えるために情熱を燃やす、頼もしいアライです！",icon:"🌈",color:"#2563eb",message:"「その情熱、絶やさないで。あなたの存在が、誰かの希望になってる。」"},
  {name:"静かなる共感者",desc:"派手な行動はなくても、いつも隣でそっと寄り添い、理解を示してくれる大切な存在です。",icon:"🕊️",color:"#7c3aed",message:"「静かに寄り添う力は、本当に強い。あなたみたいな人が世界を温かくする。」"}
];

// ===== STATE =====
let difficulty = 'BEGINNER';
let questions = [];
let currentIdx = 0;
let score = 0;
let selected = null;

function startQuiz(level) {
  difficulty = level;
  questions = QUIZ_DATA[level];
  currentIdx = 0;
  score = 0;
  selected = null;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentIdx];
  document.getElementById('q-num').textContent = currentIdx + 1;
  document.getElementById('q-total').textContent = questions.length;
  document.getElementById('q-progress').style.width = ((currentIdx + 1) / questions.length * 100) + '%';
  document.getElementById('q-text').textContent = q.text;

  const container = document.getElementById('q-options');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${String.fromCharCode(65+i)}</span><span>${opt}</span>`;
    btn.onclick = () => selectOption(i);
    container.appendChild(btn);
  });

  document.getElementById('q-explanation').style.display = 'none';
  selected = null;
}

function selectOption(idx) {
  if (selected !== null) return;
  selected = idx;
  const q = questions[currentIdx];
  const isCorrect = idx === q.correct;
  if (isCorrect) score++;

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
    else btn.classList.add('dim');
  });

  document.getElementById('exp-icon').textContent = isCorrect ? '✨' : '📖';
  const label = document.getElementById('exp-label');
  label.textContent = isCorrect ? '正解！素晴らしい！' : '解説を見てみよう';
  label.className = 'exp-label ' + (isCorrect ? 'correct-label' : 'wrong-label');
  document.getElementById('exp-text').textContent = q.explanation;
  document.getElementById('q-explanation').style.display = 'block';
}

function handleNext() {
  if (currentIdx < questions.length - 1) {
    currentIdx++;
    renderQuestion();
  } else {
    showResult();
  }
}

function getProfile() {
  if (score >= 9) return ALLY_PROFILES[2];
  if (score >= 7) return ALLY_PROFILES[3];
  if (score >= 5) return ALLY_PROFILES[1];
  if (score >= 3) return ALLY_PROFILES[4];
  return ALLY_PROFILES[0];
}

function showResult() {
  showScreen('result');
  const profile = getProfile();
  const total = questions.length;

  document.getElementById('r-level').textContent = difficulty;
  document.getElementById('r-score').textContent = score;
  document.getElementById('r-total').textContent = total;
  document.getElementById('r-icon').textContent = profile.icon;

  const nameEl = document.getElementById('r-name');
  nameEl.textContent = profile.name;
  nameEl.style.color = profile.color;

  document.getElementById('r-desc').textContent = profile.desc;
  document.getElementById('r-message').textContent = profile.message;

  // Donut chart
  const circumference = 2 * Math.PI * 56; // r=56
  const fillAmount = (score / total) * circumference;
  setTimeout(() => {
    document.getElementById('donut-fill').setAttribute('stroke-dasharray', `${fillAmount} ${circumference}`);
  }, 100);

  // Confetti
  const confetti = document.getElementById('confetti-area');
  confetti.innerHTML = '';
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('span');
    s.style.cssText = `position:absolute;font-size:1.5rem;top:${Math.random()*100}%;left:${Math.random()*100}%;transform:rotate(${Math.random()*360}deg);`;
    s.textContent = '✨';
    confetti.appendChild(s);
  }
}

function resetGame() {
  showScreen('welcome');
  // Reset donut
  document.getElementById('donut-fill').setAttribute('stroke-dasharray', '0 352');
}

function showScreen(name) {
  ['welcome','quiz','result'].forEach(s => {
    document.getElementById('screen-' + s).style.display = s === name ? 'block' : 'none';
  });
}
</script>
